name: Atualizar assets dos campi

on:
  schedule:
    # A cada 3 horas (UTC). Ajuste o fuso se quiser horário local específico.
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-assets
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Gerar JSON por campus em assets/
        run: npm run generate-assets

      - name: Commit e push (se houver alterações)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets
          if git diff --staged --quiet; then
            echo "Nenhuma alteração em assets/."
          else
            git commit -m "chore: atualiza cardápios dos campi"
            git push
          fi
